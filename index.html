<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>To-Do List</title>
</head>
<body>

  <div class="todo-container">
    <header class="todo-header">
      <!--
      1. 오늘 날짜 표시
      2. 앱 타이틀
      -->
      <p class="todo-date">2026년 07월 15일 수요일</p>
      <h1>To-Do List</h1>
    </header>

    <div class="input-section">
      <!--
      1. 카테고리/중요도 선택할 수 있는 선택창
      2. 할 일 적는 텍스트 입력창
      3. 추가 버튼
      -->
      <select class="todo-select">
        <option value="일상">일상</option>
        <option value="공부">공부</option>
        <option value="업무">업무</option>
      </select>
      <input type="text" class="todo-input" placeholder="새로운 할 일을 입력하세요.">
      <button class="add-button">추가</button>
    </div>

    <div class="filter-tabs">
      <!--
      1. 전체보기, 진행중, 완료 버튼
      -->
      <button class="tab-btn active">전체보기</button>
      <button class="tab-btn">진행중</button>
      <button class="tab-btn">완료</button>
    </div>

    <ul class="todo-list">
      <!--
      1. 할 일 아이템 리스트
      1-1. 완료 체크박스
      1-2. 할 일 텍스트
      1-3. 카테고리 태그
      1-4. 삭제 버튼
      -->
      <li class="todo-item">
        <div class="todo-content">
          <input type="checkbox" class="todo-checkbox" id="todo-1">
          <label for="todo-1" class="todo-text">HTML/CSS 기본 뼈대와 디자인 완성하기</label>
          <span class="badge badge-study">공부</span>
        </div>
        <button class="delete-button">&times;</button>
      </li>

      <li class="todo-item completed">
        <div class="todo-content">
          <input type="checkbox" class="todo-checkbox" id="todo-2" checked>
          <label for="todo-2" class="todo-text">투두리스트 기능 기획하기</label>
          <span class="badge badge-work">업무</span>
        </div>
        <button class="delete-button">&times;</button>
      </li>
    </ul>
  </div>

</body>
</html>
